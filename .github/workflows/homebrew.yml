name: Update Homebrew formula

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-formula:
    name: Update Formula/memo.rb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for release assets
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for i in $(seq 1 12); do
            COUNT=$(curl -fsSL \
              "https://api.github.com/repos/rustkit-ai/memo-agent/releases/tags/v${VERSION}" \
              | jq '.assets | length')
            echo "Assets available: $COUNT"
            [ "$COUNT" -ge 4 ] && break
            echo "Waiting for assets... ($i/12)"
            sleep 30
          done

      - name: Compute SHA256 and update formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE="https://github.com/rustkit-ai/memo-agent/releases/download/v${VERSION}"

          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            sha=$(curl -fsSL "${BASE}/memo-${target}.tar.gz" | sha256sum | awk '{print $1}')
            echo "${target}: ${sha}"
            escaped=$(echo "$target" | sed 's/\./\\./g; s/-/\\-/g')
            sed -i "/memo-${escaped}\.tar\.gz/{n;s|sha256 .*|sha256 \"${sha}\"|}" Formula/memo.rb
          done

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/memo.rb
          cat Formula/memo.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/memo.rb
          git diff --staged --quiet || git commit -m "Update Homebrew formula to v${{ steps.version.outputs.version }}"
          git push
