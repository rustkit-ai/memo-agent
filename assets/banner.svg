<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a371f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#grid)" rx="12"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="300" fill="url(#accent)" rx="2"/>

  <!-- Terminal icon -->
  <rect x="60" y="100" width="100" height="70" rx="8" fill="none" stroke="#30363d" stroke-width="2"/>
  <rect x="60" y="100" width="100" height="18" rx="8" fill="#21262d"/>
  <rect x="60" y="109" width="100" height="9" fill="#21262d"/>
  <circle cx="75" cy="109" r="4" fill="#ff5f57"/>
  <circle cx="89" cy="109" r="4" fill="#febc2e"/>
  <circle cx="103" cy="109" r="4" fill="#28c840"/>
  <text x="70" y="142" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#58a6ff">$ memo inject</text>
  <text x="70" y="158" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#3fb950">## memo context</text>

  <!-- Name -->
  <text x="200" y="155" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">memo</text>

  <!-- Gradient underline -->
  <rect x="200" y="168" width="220" height="3" fill="url(#accent)" rx="2"/>

  <!-- Tagline -->
  <text x="200" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#8b949e" letter-spacing="0.3">Persistent memory for AI coding agents</text>

  <!-- Right side — feature pills -->
  <g transform="translate(740, 100)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="21" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#58a6ff" text-anchor="middle">⚡ single binary</text>

    <!-- Pill 2 -->
    <rect x="175" y="0" width="160" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="255" y="21" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#a371f7" text-anchor="middle">🔒 SQLite storage</text>

    <!-- Pill 3 -->
    <rect x="0" y="46" width="160" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="67" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#3fb950" text-anchor="middle">🤖 Claude Code</text>

    <!-- Pill 4 -->
    <rect x="175" y="46" width="160" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="255" y="67" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#f0883e" text-anchor="middle">~80 tokens/session</text>

    <!-- Pill 5 -->
    <rect x="87" y="92" width="160" height="32" rx="16" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="167" y="113" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">zero dependencies</text>
  </g>
</svg>
